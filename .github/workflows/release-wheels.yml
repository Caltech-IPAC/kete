# This workflow will create wheels files for all major distros for several versions of python.
# This only triggers on release tags.

name: Release Wheels

on:
  release:
    types:
      - published
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build_wheels:
    name: Build wheel for python ${{ matrix.python }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
    strategy:
      # Ensure that a wheel builder finishes even if another fails
      fail-fast: false
      matrix:
        python:
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
        os:
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache downloaded files
        id: cache-kete
        uses: actions/cache@v4
        env:
          cache-name: cache-kete
        with:
          # kete stores all files in `~/.kete/` by default
          path: ~/.kete
          # These files are valid long term, and are not expected to change
          # between runs. So there is no need to a changing name.
          key: kete-cache

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache-key: ${{ runner.os }}-stable

      - name: Install uv and set the Python version
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true
          activate-environment: true
          restore-cache: true
          save-cache: true
          prune-cache: false
          ignore-nothing-to-cache: true

      - name: Install dependencies
        run: |
          uv sync

      - name: Build wheels
        run: |
          uv build --wheel

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheel-cp${{ matrix.python }}-${{ runner.os }}
          path: ./dist/*.whl

  build_linux:
    name: Build wheel for python ${{ matrix.python }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      id-token: write
      contents: read
    timeout-minutes: 30
    strategy:
      # Ensure that a wheel builder finishes even if another fails
      fail-fast: false
      matrix:
        python:
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
        os:
          - self-hosted
    environment:
      name: devpi
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache downloaded files
        id: cache-kete
        uses: actions/cache@v4
        env:
          cache-name: cache-kete
        with:
          # kete stores all files in `~/.kete/` by default
          path: ~/.kete
          # These files are valid long term, and are not expected to change
          # between runs. So there is no need to a changing name.
          key: kete-cache

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache-key: ${{ runner.os }}-stable

      - name: Install uv and set the Python version
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true
          activate-environment: true
          restore-cache: true
          save-cache: true
          prune-cache: false
          ignore-nothing-to-cache: true

      - name: Install devpi
        run: |
          uv tool install devpi-client

      - name: Configure uv to use devpi
        run: |
          devpi use -y https://pypi.neosdev.ipac.caltech.edu
          devpi login -y ${{ secrets.DEVPI_USER }} --password '${{ secrets.DEVPI_PASS }}'
          devpi use -y --set-cfg --pip-set-trusted yes neos/stable

      - name: Install dependencies
        run: |
          uv sync
        env:
          UV_DEFAULT_INDEX: https://pypi.neosdev.ipac.caltech.edu/neos/stable/+simple/
          UV_INDEX: https://pypi.neosdev.ipac.caltech.edu/neos/stable/+simple/
          PIP_INDEX_URL: https://pypi.neosdev.ipac.caltech.edu/neos/stable/+simple/
          PIP_EXTRA_INDEX_URL: https://pypi.neosdev.ipac.caltech.edu/neos/stable/+simple/
          PIP_TRUSTED_HOST: pypi.neosdev.ipac.caltech.edu

      - name: Build wheels
        run: |
          uv build --wheel
        env:
          UV_DEFAULT_INDEX: https://pypi.neosdev.ipac.caltech.edu/neos/stable/+simple/
          UV_INDEX: https://pypi.neosdev.ipac.caltech.edu/neos/stable/+simple/
          PIP_INDEX_URL: https://pypi.neosdev.ipac.caltech.edu/neos/stable/+simple/
          PIP_EXTRA_INDEX_URL: https://pypi.neosdev.ipac.caltech.edu/neos/stable/+simple/
          PIP_TRUSTED_HOST: pypi.neosdev.ipac.caltech.edu

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheel-cp${{ matrix.python }}-${{ runner.os }}
          path: ./dist/*.whl

      - name: Remove local configuration changes
        run: |
          rm -f ~/.config/pip/pip.conf
          rm -f ~/.config/uv/uv.toml
          rm -f ~/.pydistutils.cfg
          rm -f ~/.buildout/default.cfg

  publish-to-pypi:
    name: Publish Kete to PyPI
    needs:
      - build_wheels
      - build_linux
    runs-on: self-hosted
    environment:
      name: devpi
    permissions:
      id-token: write
    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          print-hash: true
          attestations: false
          user: ${{ secrets.DEVPI_USER }}
          password: ${{ secrets.DEVPI_PASS }}
          repository-url: https://pypi.neosdev.ipac.caltech.edu/neos/stable/
	  