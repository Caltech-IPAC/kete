# This workflow will install Python dependencies, run tests, lint, and build docs
# This run for every pull request

name: Tests and Lint

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  RUSTFLAGS: "-D warnings"
  RUSTDOCFLAGS: "-D warnings"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and test with python ${{ matrix.python }} on ${{ matrix.os }}
    timeout-minutes: 30
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python:
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
        os:
          - macos-latest
          - ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache downloaded files
        id: cache-kete
        uses: actions/cache@v5
        env:
          cache-name: cache-kete
        with:
          # kete stores all files in `~/.kete/` by default
          path: ~/.kete
          # These files are valid long term, and are not expected to change
          # between runs. So there is no need to a changing name.
          key: kete-cache

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache-key: ${{ runner.os }}-stable

      - name: Install uv and set the Python version
        uses: astral-sh/setup-uv@v8
        with:
          python-version: ${{ matrix.python }}
          activate-environment: true
          ignore-nothing-to-cache: true

      - name: Install dependencies
        run: |
          uv sync --all-groups --all-extras

      - name: Check formatting with ruff
        uses: astral-sh/ruff-action@v4
        with:
          args: "format --check --diff"

      - name: Lint with mypy
        run: |
          uv run mypy src/kete/

      - name: Test with pytest
        run: |
          uv run pytest --cov-report term-missing --cov=kete

      - name: Test with cargo
        run: |
          cargo test

  docs:
    needs: build
    if: success()
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache downloaded files
        id: cache-kete
        uses: actions/cache@v5
        env:
          cache-name: cache-kete
        with:
          # kete stores all files in `~/.kete/` by default
          path: ~/.kete
          # These files are valid long term, and are not expected to change
          # between runs. So there is no need to a changing name.
          key: kete-cache

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache-key: ${{ runner.os }}-stable

      - name: Install uv and set the Python version
        uses: astral-sh/setup-uv@v8
        with:
          python-version: ${{ matrix.python }}
          activate-environment: true
          ignore-nothing-to-cache: true

      - name: Install dependencies
        run: |
          uv sync --all-groups --all-extras

      - name: Cargo Docs
        run: |
          cargo doc --no-deps --release

      # Build documentation and push artifact
      - name: Build Docs
        run: |
          cd docs
          make clean
          make doctest
          make html

      - name: Fix permissions
        run: |
          chmod -c -R +rX "docs/" | while read line; do
            echo "::warning title=Invalid file permissions automatically fixed::$line"
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          name: "github-pages"
          path: docs/html/

  deploy:
    needs: docs
    if: success() && github.ref == 'refs/heads/main'

    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    permissions:
      pages: write # to deploy to Pages
      id-token: write # to verify the deployment originates from an appropriate source

    # Deploy to the github-pages environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    # Specify runner + deployment step
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
